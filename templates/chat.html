<!DOCTYPE html>
<html>
<head>
    <title>AI Virtual Gym Coach</title>
    <style>
        body { font-family: Arial; background:#0f172a; color:white; padding:40px; }
        .box { background:#1e293b; padding:20px; border-radius:12px; width:600px; }
        button { background:#38bdf8; padding:10px; border:none; border-radius:8px; cursor:pointer; }
        textarea { width:100%; padding:10px; border-radius:6px; }
    </style>
</head>
<body>

<h1>🤖 Virtual AI Gym Coach</h1>

<div class="box">
    <form method="POST">
        <textarea name="message" placeholder="Ask your coach anything..." required></textarea>
        <br><br>
        <button type="submit">Ask Coach</button>
    </form>

    {% if response %}
        <hr>
        <h3>Coach Response:</h3>
        <pre>{{ response }}</pre>
    {% endif %}
</div>

<br>
<a href="/dashboard"><button>Back to Dashboard</button></a>

</body>
</html>
